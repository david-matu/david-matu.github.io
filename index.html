    <script>
      const bouncyCircle = new mojs.Shape({
      parent:       '#bouncyCircle',
      shape:        'circle',
      fill:         {'#0F0': '#2F3'},
      radius:       {10: 30},
      duration:     2000,
      isYoyo:       true,
      isShowStart:  true,
      easing:       'elastic.inout',
      repeat:       200,
    });

    bouncyCircle.play();

    let rot = 0;
    tick();

    function tick() {
      requestAnimationFrame(tick);
      rot += 0.02;
      document.body.style.setProperty("--rot", `${rot}deg`);
    }
    </script>
